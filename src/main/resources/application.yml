server:
  port: 8082

spring:
  application:
    name: kafka-implementation
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: kafkaexmaple-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 5

app:
  kafka:
    consumer-1-topic: topic-one
    consumer-2-topic: topic-two
    consumer-3-topic: topic-three
    consumer-2-group: kafkaexmaple-group-2
    consumer-3-group: kafkaexmaple-group-3
    publish:
      max-attempts: 5
      retry-backoff-ms: 200
      delay-ms: 100
  workflow:
    topics:
      initiated: resource-workflow-initiated
      quota-reserved: resource-workflow-quota-reserved
      quota-rejected: resource-workflow-quota-rejected
      provision-succeeded: resource-workflow-provision-succeeded
      provision-failed: resource-workflow-provision-failed
      quota-committed: resource-workflow-quota-committed
      quota-reverted: resource-workflow-quota-reverted
      usage-recorded: resource-workflow-usage-recorded
    groups:
      quota: resource-workflow-quota-group
      provision: resource-workflow-provision-group
      quota-commit: resource-workflow-quota-commit-group
      quota-revert: resource-workflow-quota-revert-group
      usage: resource-workflow-usage-group
